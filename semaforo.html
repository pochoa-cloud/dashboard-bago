<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Semáforo Portafolio</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0b0f;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  .card {
    background: #111318;
    border: 1px solid #1a1d26;
    border-radius: 16px;
    padding: 28px 36px;
    display: inline-flex;
    align-items: center;
    gap: 24px;
    opacity: 0;
    animation: fadeIn 0.5s ease 0.2s forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .donut-wrap {
    position: relative;
    width: 100px;
    height: 100px;
    flex-shrink: 0;
  }

  .donut-wrap svg {
    width: 100%; height: 100%;
    transform: rotate(-90deg);
  }

  .donut-bg   { fill: none; stroke: #1a1d26; }
  .donut-outer { fill: none; stroke: #66bb6a; stroke-linecap: round; }
  .donut-inner { fill: none; stroke-linecap: round; transition: stroke-dashoffset 1.2s cubic-bezier(0.16,1,0.3,1); }

  .val-label {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #4a5068;
    margin-bottom: 4px;
  }

  .val-number {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    line-height: 1;
  }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid #1a1d26;
    border-top-color: #e040fb;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div id="loading"><div class="spinner"></div></div>

  <div id="main" style="display:none; align-items:center; gap:24px">
    <div class="donut-wrap">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <!-- BG tracks -->
        <circle class="donut-bg" cx="50" cy="50" r="40" stroke-width="7"/>
        <circle class="donut-bg" cx="50" cy="50" r="27" stroke-width="7"/>
        <!-- Outer = 100% verde -->
        <circle class="donut-outer" cx="50" cy="50" r="40" stroke-width="7"
          stroke-dasharray="251.33" stroke-dashoffset="0"/>
        <!-- Inner = SPI dinámico -->
        <circle class="donut-inner" id="ring-spi"
          cx="50" cy="50" r="27" stroke-width="7"
          stroke-dasharray="169.65" stroke-dashoffset="169.65"/>
      </svg>
    </div>

    <div>
      <div class="val-label">SPI Portafolio</div>
      <div class="val-number" id="spi-num">—</div>
    </div>
  </div>
</div>

<script>
  const TOKEN   = 'ntn_h28436678537wLv37VyJFvRRrho77CWB0CCKSFw61lt8rL';
  const WORKER  = 'https://royal-limit-9465.pochoa.workers.dev/';
  const PAGE_ID = '31a0a97eed8d8019b154fd5b94712b14';

  async function api(url, payload = {}) {
    const res = await fetch(WORKER, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, token: `Bearer ${TOKEN}`, payload })
    });
    return res.json();
  }

  function spiColor(v) {
    if (v >= 90) return '#26c6da';
    if (v >= 80) return '#ffa726';
    return '#ef5350';
  }

  async function load() {
    try {
      const data = await api(`https://api.notion.com/v1/pages/${PAGE_ID}`);
      const props = data.properties;

      function exNum(prop) {
        if (!prop) return null;
        if (prop.type === 'rollup' && prop.rollup.type === 'number') return prop.rollup.number;
        if (prop.type === 'formula') return prop.formula?.number ?? null;
        if (prop.type === 'number') return prop.number ?? null;
        return null;
      }

      const spiRaw = exNum(props['SPI Portafolio']);
      const spi = spiRaw !== null ? (spiRaw <= 1 ? spiRaw * 100 : spiRaw) : null;

      document.getElementById('loading').style.display = 'none';
      const main = document.getElementById('main');
      main.style.display = 'flex';

      if (spi === null) return;

      const color = spiColor(spi);

      document.getElementById('spi-num').textContent = spi.toFixed(2).replace('.', ',') + '%';
      document.getElementById('spi-num').style.color = color;

      const C = 169.65;
      const offset = C - (C * Math.min(spi, 100) / 100);
      const ring = document.getElementById('ring-spi');
      ring.setAttribute('stroke', color);

      setTimeout(() => { ring.style.strokeDashoffset = offset; }, 300);

    } catch(e) { console.error(e); }
  }

  load();
</script>
</body>
</html>
