<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Semáforo Portafolio</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0b0f;
    font-family: 'DM Sans', sans-serif;
    color: #e8eaf0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    background: #111318;
    border: 1px solid #1a1d26;
    border-radius: 16px;
    padding: 28px 36px;
    display: inline-flex;
    align-items: center;
    gap: 32px;
    opacity: 0;
    animation: fadeIn 0.5s ease 0.2s forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* DONUT SVG */
  .donut-wrap {
    position: relative;
    width: 100px;
    height: 100px;
    flex-shrink: 0;
  }

  .donut-wrap svg {
    width: 100%; height: 100%;
    transform: rotate(-90deg);
  }

  .donut-bg    { fill: none; stroke: #1a1d26; }
  .donut-meta  { fill: none; stroke-linecap: round; transition: stroke-dashoffset 1.2s cubic-bezier(0.16,1,0.3,1); }
  .donut-spi   { fill: none; stroke-linecap: round; transition: stroke-dashoffset 1.2s cubic-bezier(0.16,1,0.3,1) 0.1s; }

  /* VALUES */
  .values { display: flex; flex-direction: column; gap: 10px; }

  .val-row {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .val-label {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #4a5068;
  }

  .val-number {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    line-height: 1;
  }

  .val-meta {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: #26c6da;
    line-height: 1;
  }

  .divider {
    width: 1px;
    height: 32px;
    background: #1a1d26;
    align-self: center;
  }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid #1a1d26;
    border-top-color: #e040fb;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="card">
  <div id="loading" style="padding:20px"><div class="spinner"></div></div>

  <div id="main" style="display:none; contents: contents">

    <!-- DONUT -->
    <div class="donut-wrap">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <!-- BG rings -->
        <circle class="donut-bg" cx="50" cy="50" r="40" stroke-width="7"/>
        <circle class="donut-bg" cx="50" cy="50" r="28" stroke-width="7"/>

        <!-- META ring (outer) - always cyan at 95% -->
        <circle class="donut-meta" id="ring-meta"
          cx="50" cy="50" r="40" stroke-width="7"
          stroke="#26c6da"
          stroke-dasharray="251.33"
          stroke-dashoffset="251.33"/>

        <!-- SPI ring (inner) - color dinámico -->
        <circle class="donut-spi" id="ring-spi"
          cx="50" cy="50" r="28" stroke-width="7"
          stroke="#ef5350"
          stroke-dasharray="175.93"
          stroke-dashoffset="175.93"/>
      </svg>
    </div>

    <!-- VALUES -->
    <div class="values">
      <div class="val-row">
        <div class="val-label">SPI Portafolio</div>
        <div class="val-number" id="spi-num">—</div>
      </div>
      <div class="divider"></div>
      <div class="val-row">
        <div class="val-label">Meta</div>
        <div class="val-meta">95,00%</div>
      </div>
    </div>

  </div>
</div>

<script>
  const TOKEN   = 'ntn_h28436678537wLv37VyJFvRRrho77CWB0CCKSFw61lt8rL';
  const WORKER  = 'https://royal-limit-9465.pochoa.workers.dev/';
  const PAGE_ID = '31a0a97eed8d8019b154fd5b94712b14';
  const META    = 95;

  async function api(url, payload = {}) {
    const res = await fetch(WORKER, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, token: `Bearer ${TOKEN}`, payload })
    });
    return res.json();
  }

  function spiColor(v) {
    if (v >= 90) return '#26c6da';
    if (v >= 80) return '#ffa726';
    return '#ef5350';
  }

  async function load() {
    try {
      const data = await api(`https://api.notion.com/v1/pages/${PAGE_ID}`);
      const props = data.properties;

      function exNum(prop) {
        if (!prop) return null;
        if (prop.type === 'rollup' && prop.rollup.type === 'number') return prop.rollup.number;
        if (prop.type === 'formula') return prop.formula?.number ?? null;
        if (prop.type === 'number') return prop.number ?? null;
        return null;
      }

      const spiRaw = exNum(props['SPI Portafolio']);
      const spi = spiRaw !== null ? (spiRaw <= 1 ? spiRaw * 100 : spiRaw) : null;

      document.getElementById('loading').style.display = 'none';
      document.getElementById('main').style.display = 'contents';

      if (spi === null) return;

      const color = spiColor(spi);

      // SPI number
      document.getElementById('spi-num').textContent = spi.toFixed(2).replace('.', ',') + '%';
      document.getElementById('spi-num').style.color = color;

      // Rings
      // Outer ring = META (95%) — always cyan
      // circumference r=40 → 2π×40 = 251.33
      const C_OUTER = 251.33;
      const metaPct = META / 100;
      const metaOffset = C_OUTER - (C_OUTER * metaPct);
      document.getElementById('ring-meta').setAttribute('stroke', '#26c6da');

      // Inner ring = SPI — color dinámico
      // circumference r=28 → 2π×28 = 175.93
      const C_INNER = 175.93;
      const spiPct  = Math.min(spi, 100) / 100;
      const spiOffset = C_INNER - (C_INNER * spiPct);
      document.getElementById('ring-spi').setAttribute('stroke', color);

      setTimeout(() => {
        document.getElementById('ring-meta').style.strokeDashoffset = metaOffset;
        document.getElementById('ring-spi').style.strokeDashoffset  = spiOffset;
      }, 300);

    } catch(e) { console.error(e); }
  }

  load();
</script>
</body>
</html>
