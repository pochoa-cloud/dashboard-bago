<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPIs Portafolio</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0f14;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px 16px;
  }

  .wrapper { width: 100%; max-width: 100%; }

  .section-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #4a5068;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #1a1d26;
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
  }

  .card {
    background: #111318;
    border: 1px solid #1a1d26;
    border-radius: 16px;
    padding: 16px 14px 14px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s ease, border-color 0.2s ease;
    opacity: 0;
    animation: cardIn 0.5s ease forwards;
  }

  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.15s; }
  .card:nth-child(3) { animation-delay: 0.25s; }

  .card:hover { transform: translateY(-2px); }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 16px 16px 0 0;
  }

  .card::after {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 120px; height: 120px;
    border-radius: 50%;
    opacity: 0.04;
    pointer-events: none;
  }

  /* Magenta palette */
  .card.blue::before   { background: linear-gradient(90deg, #e040fb, #ab47bc); }
  .card.yellow::before { background: linear-gradient(90deg, #f06292, #e040fb); }
  .card.green::before  { background: linear-gradient(90deg, #26c6da, #00bcd4); }
  .card.red::before    { background: linear-gradient(90deg, #ef5350, #e040fb); }
  .card.purple::before { background: linear-gradient(90deg, #7c4dff, #e040fb); }

  .card.blue::after   { background: #e040fb; }
  .card.yellow::after { background: #f06292; }
  .card.green::after  { background: #26c6da; }
  .card.red::after    { background: #ef5350; }
  .card.purple::after { background: #7c4dff; }

  .card:hover.blue   { border-color: rgba(224,64,251,0.35); }
  .card:hover.yellow { border-color: rgba(240,98,146,0.35); }
  .card:hover.green  { border-color: rgba(38,198,218,0.35); }
  .card:hover.red    { border-color: rgba(239,83,80,0.35); }
  .card:hover.purple { border-color: rgba(124,77,255,0.35); }

  .card-icon { display: none; }

  .card-label {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #c0c4d6;
    margin-bottom: 10px;
  }

  .card-value {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 10px;
    letter-spacing: -0.02em;
    white-space: nowrap;
    overflow: visible;
  }

  .card.blue   .card-value { color: #e040fb; }
  .card.yellow .card-value { color: #f06292; }
  .card.green  .card-value { color: #26c6da; }
  .card.red    .card-value { color: #ef5350; }
  .card.purple .card-value { color: #7c4dff; }

  .progress-track {
    width: 100%;
    height: 4px;
    background: #1a1d26;
    border-radius: 4px;
    margin-bottom: 0;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 4px;
    width: 0%;
    transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .card.blue   .progress-fill { background: linear-gradient(90deg, #e040fb, #ab47bc); }
  .card.yellow .progress-fill { background: linear-gradient(90deg, #f06292, #e040fb); }
  .card.green  .progress-fill { background: linear-gradient(90deg, #26c6da, #00bcd4); }
  .card.red    .progress-fill { background: linear-gradient(90deg, #ef5350, #e040fb); }
  .card.purple .progress-fill { background: linear-gradient(90deg, #7c4dff, #e040fb); }

  .card-footer { display: none; }
  .card-status { display: none; }
  .status-dot  { display: none; }
  .card-projects { display: none; }

  .footer-row {
    margin-top: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .footer-meta { font-size: 11px; color: #2a2d3a; }
  .footer-meta strong { color: #3a3d4a; font-weight: 500; }

  /* Loading state */
  .loading {
    text-align: center;
    padding: 40px;
    color: #4a5068;
    font-size: 13px;
    display: none;
  }

  .loading.visible { display: block; }

  .spinner {
    width: 20px; height: 20px;
    border: 2px solid #1a1d26;
    border-top-color: #4f8ef7;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 10px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .cards { grid-template-columns: 1fr; }
    .card-value { font-size: 32px; }
  }
</style>
</head>
<body>

<div class="wrapper">
  <div class="section-label">Indicadores consolidados del portafolio</div>

  <div id="loading" class="loading visible">
    <div class="spinner"></div>
    Cargando datos desde Notion...
  </div>

  <div class="cards" id="cards" style="display:none">

    <div class="card purple" id="card-count">
      <div class="card-icon">📋</div>
      <div class="card-label">Proyectos</div>
      <div class="card-value" id="val-count">—</div>
      <div class="progress-track">
        <div class="progress-fill" id="bar-count"></div>
      </div>
      <div class="card-footer">
        <div class="card-status">
          <div class="status-dot"></div>
          <span>En portafolio</span>
        </div>
        <div class="card-projects">activos</div>
      </div>
    </div>

    <div class="card blue" id="card-real">
      <div class="card-icon">📈</div>
      <div class="card-label">Avance Real</div>
      <div class="card-value" id="val-real">—</div>
      <div class="progress-track">
        <div class="progress-fill" id="bar-real"></div>
      </div>
      <div class="card-footer">
        <div class="card-status">
          <div class="status-dot"></div>
          <span>En seguimiento</span>
        </div>
        <div class="card-projects" id="proj-count">— proyectos</div>
      </div>
    </div>

    <div class="card yellow" id="card-esp">
      <div class="card-icon">🎯</div>
      <div class="card-label">Avance Esperado</div>
      <div class="card-value" id="val-esp">—</div>
      <div class="progress-track">
        <div class="progress-fill" id="bar-esp"></div>
      </div>
      <div class="card-footer">
        <div class="card-status">
          <div class="status-dot"></div>
          <span>Meta acumulada</span>
        </div>
        <div class="card-projects">meta del período</div>
      </div>
    </div>

    <div class="card yellow" id="card-spi">
      <div class="card-icon">⚡</div>
      <div class="card-label">SPI Portafolio</div>
      <div class="card-value" id="val-spi">—</div>
      <div class="progress-track">
        <div class="progress-fill" id="bar-spi"></div>
      </div>
      <div class="card-footer">
        <div class="card-status">
          <div class="status-dot"></div>
          <span id="spi-label">Calculando...</span>
        </div>
        <div class="card-projects">meta = 1,00</div>
      </div>
    </div>

  </div>

  <div class="footer-row">
    <div class="footer-meta">Portafolio Estratégico · <strong>Bagó Ecuador</strong></div>
    <div class="footer-meta" id="last-update"></div>
  </div>
</div>

<script>
  const NOTION_TOKEN = 'ntn_h28436678537wLv37VyJFvRRrho77CWB0CCKSFw61lt8rL';
  const DATABASE_ID  = '31a0a97eed8d80529d6ffef61cd63003';
  const PAGE_ID      = '31a0a97eed8d8019b154fd5b94712b14';

  async function loadData() {
    try {
      // Leer directamente desde Proyectos — misma fuente que la tabla
      const res = await fetch('https://royal-limit-9465.pochoa.workers.dev/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          url: 'https://api.notion.com/v1/databases/24d0a97eed8d81e99427e311c9f026aa/query',
          token: `Bearer ${NOTION_TOKEN}`,
          payload: { page_size: 100 }
        })
      });
      const data = await res.json();



      if (!data.results) {
        showError('No se encontraron datos.');
        console.log('Notion error:', JSON.stringify(data));
        return;
      }

      const projects = data.results;
      const projectCount = projects.length;

      // Debug: log all project values
      let debugReal = [], debugEsp = [];
      for (const page of projects) {
        const p = page.properties;
        const nombre = p['Nombre del proyecto']?.title?.[0]?.plain_text || p['Proyecto estratégico']?.title?.[0]?.plain_text || '?';
        const r = p['% Real'];
        const e = p['% Esperado ajustado'];
        const rVal = r?.type === 'number' ? r.number : r?.type === 'formula' ? r.formula?.number : null;
        const eVal = e?.type === 'number' ? e.number : e?.type === 'formula' ? e.formula?.number : null;
        debugReal.push(nombre + ': ' + rVal);
        debugEsp.push(nombre + ': ' + eVal);
      }
      console.log('% Real por proyecto:', debugReal.join(' | '));
      console.log('% Esperado ajustado por proyecto:', debugEsp.join(' | '));

      // Extraer valores de cada proyecto
      function getPct(prop) {
        if (!prop) return null;
        let v = null;
        if (prop.type === 'number') v = prop.number;
        else if (prop.type === 'formula') v = prop.formula?.number ?? null;
        else if (prop.type === 'percent') v = prop.number;
        if (v === null) return null;
        // Notion guarda porcentajes como 0-1 (ej: 0.71 = 71%)
        return v <= 1 ? v * 100 : v;
      }

      let sumReal = 0, sumEsp = 0, countReal = 0, countEsp = 0;
      for (const page of projects) {
        const p = page.properties;
        const r = getPct(p['% Real']);
        const e = getPct(p['% Esperado ajustado']);
        if (r !== null) { sumReal += r; countReal++; }
        if (e !== null) { sumEsp  += e; countEsp++;  }
      }

      const real = countReal > 0 ? sumReal / countReal : null;
      const esp  = countEsp  > 0 ? sumEsp  / countEsp  : null;
      const spi  = (real !== null && esp !== null && esp > 0) ? (real / esp) * 100 : null;

      renderCards(real, esp, spi, projectCount);

    } catch (err) {
      showError('Error conectando con Notion.');
      console.error(err);
    }
  }

  function renderCards(real, esp, spi, projectCount) {
    document.getElementById('loading').classList.remove('visible');
    document.getElementById('cards').style.display = 'grid';
    setTimeout(fitCardValues, 100);

    // Avance Real
    document.getElementById('val-real').textContent =
      real !== null ? real.toFixed(2).replace('.', ',') + '%' : 'N/D';

    // Avance Esperado
    document.getElementById('val-esp').textContent =
      esp !== null ? esp.toFixed(2).replace('.', ',') + '%' : 'N/D';

    // SPI con color dinámico
    const spiVal = spi !== null ? spi : (real && esp ? real / esp * 100 : null);
    const spiDisplay = spiVal !== null ? spiVal.toFixed(2).replace('.', ',') + '%' : 'N/D';
    document.getElementById('val-spi').textContent = spiDisplay;

    const cardSpi = document.getElementById('card-spi');
    const lblSpi  = document.getElementById('spi-label');
    cardSpi.classList.remove('blue', 'yellow', 'green', 'red');

    if (spiVal >= 95) {
      cardSpi.classList.add('green');
      lblSpi.textContent = 'En tiempo';
    } else if (spiVal >= 85) {
      cardSpi.classList.add('yellow');
      lblSpi.textContent = 'Leve retraso';
    } else {
      cardSpi.classList.add('red');
      lblSpi.textContent = 'Retraso significativo';
    }

    // Proyectos
    if (projectCount !== null) {
      document.getElementById('val-count').textContent = projectCount;
      document.getElementById('card-count').style.display = '';
    }

    // Animar barras
    setTimeout(() => {
      if (real !== null) document.getElementById('bar-real').style.width = Math.min(real, 100) + '%';
      if (esp  !== null) document.getElementById('bar-esp').style.width  = Math.min(esp,  100) + '%';
      if (spiVal !== null) document.getElementById('bar-spi').style.width = Math.min(spiVal, 100) + '%';
      if (projectCount !== null) document.getElementById('bar-count').style.width = Math.min(projectCount * 5, 100) + '%';
    }, 400);

    // Fecha
    const now  = new Date();
    const opts = { day: 'numeric', month: 'long', year: 'numeric' };
    document.getElementById('last-update').innerHTML =
      'Actualizado: <strong>' + now.toLocaleDateString('es-ES', opts) + '</strong>';
  }

  function showError(msg) {
    document.getElementById('loading').innerHTML = `<p style="color:#ef4444">${msg}</p>`;
  }

  loadData();

  // Auto-fit font size to card width
  function fitCardValues() {
    document.querySelectorAll('.card-value').forEach(el => {
      el.style.fontSize = '22px';
      const card = el.closest('.card');
      if (!card) return;
      const available = card.clientWidth - 28; // padding
      let size = 22;
      while (el.scrollWidth > available && size > 11) {
        size -= 0.5;
        el.style.fontSize = size + 'px';
      }
    });
  }

  // Run after data loads and on resize
  const origRender = renderCards;
  window.addEventListener('resize', fitCardValues);
  // Patch renderCards to call fitCardValues after render
  const _orig = renderCards;
  window.renderCardsOrig = _orig;
  setTimeout(fitCardValues, 800);
</script>

</body>
</html>
