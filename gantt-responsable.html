<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gantt por Responsable · Bagó Ecuador 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:      #0a0b0f;
    --surface: #111318;
    --border:  #1a1d26;
    --text:    #e8eaf0;
    --muted:   #4a5068;
    --magenta: #e040fb;
    --cyan:    #26c6da;
    --yellow:  #ffa726;
    --red:     #ef5350;
    --green:   #66bb6a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    padding: 20px;
    min-height: 100vh;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px 24px;
    overflow: hidden;
  }
  .card-header {
    display: flex; justify-content: space-between;
    align-items: flex-start; margin-bottom: 20px;
    flex-wrap: wrap; gap: 10px;
  }
  .card-label {
    font-size: 9px; font-weight: 500;
    letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 3px;
  }
  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 700; color: var(--text);
  }
  .legend {
    display: flex; gap: 14px; flex-wrap: wrap; align-items: center;
  }
  .legend-item {
    display: flex; align-items: center; gap: 5px;
    font-size: 10px; color: var(--muted);
  }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

  /* ── GANTT ── */
  .gantt-outer { overflow-x: auto; }
  .gantt-inner { min-width: 700px; display: flex; flex-direction: column; }

  /* Nombre + tipo columnas fijas */
  .NAME_W  { width: 190px; min-width: 190px; flex-shrink: 0; }
  .TIPO_W  { width: 32px;  min-width: 32px;  flex-shrink: 0; }

  /* ── MONTH HEADER ── */
  .month-header-row {
    display: flex;
    align-items: flex-end;
    margin-bottom: 6px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--border);
  }
  .mh-spacer { width: 222px; min-width: 222px; flex-shrink: 0; } /* NAME_W + TIPO_W */
  .mh-timeline {
    flex: 1;
    position: relative;
    height: 32px;
  }
  /* Cada label de mes/trimestre */
  .mh-label {
    position: absolute;
    transform: translateX(-50%);
    bottom: 0;
    text-align: center;
    white-space: nowrap;
  }
  .mh-label .m-name {
    display: block;
    font-size: 9px; font-weight: 600;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text);
  }
  .mh-label .m-year {
    display: block;
    font-size: 8px; color: var(--muted);
    letter-spacing: 0.5px;
  }
  /* Tick vertical */
  .mh-tick {
    position: absolute;
    bottom: -8px;
    width: 1px;
    height: 8px;
    background: var(--muted);
    transform: translateX(-50%);
  }

  /* ── RESP BLOCK ── */
  .resp-block { margin-bottom: 2px; }
  .resp-sep {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 0 6px 0;
    border-bottom: 1px solid var(--border);
  }
  .resp-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .resp-name {
    font-family: 'Syne', sans-serif;
    font-size: 12px; font-weight: 700; color: var(--text);
  }
  .resp-count { font-size: 10px; color: var(--muted); }

  /* ── PROJ ROW ── */
  .proj-row {
    display: flex; align-items: center;
    height: 30px;
    border-bottom: 1px solid rgba(26,29,38,0.4);
  }
  .proj-row:last-child { border-bottom: none; }

  .proj-name-col {
    width: 190px; min-width: 190px; flex-shrink: 0;
    font-size: 11px; color: var(--text);
    white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; padding-right: 10px;
  }
  .proj-tipo-col {
    width: 32px; min-width: 32px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .tipo-badge {
    display: inline-block; padding: 2px 5px;
    border-radius: 3px; font-size: 8px; font-weight: 700;
  }
  .tipo-e { background:rgba(224,64,251,0.15); color:var(--magenta); }
  .tipo-t { background:rgba(38,198,218,0.15);  color:var(--cyan); }

  .timeline-col {
    flex: 1; position: relative; height: 100%;
    display: flex; align-items: center;
  }
  .grid-line {
    position: absolute; top: 0; bottom: 0;
    width: 1px; background: var(--border); opacity: 0.35;
    pointer-events: none;
  }
  .today-line {
    position: absolute; top: -3px; bottom: -3px;
    width: 2px; background: var(--yellow); opacity: 0.75;
    z-index: 5; pointer-events: none; border-radius: 1px;
  }
  .gantt-bar {
    position: absolute; height: 16px; border-radius: 4px;
    display: flex; align-items: center; overflow: hidden;
    cursor: pointer; opacity: 0;
    transition: opacity 0.4s ease, filter 0.15s ease;
  }
  .gantt-bar.show { opacity: 1; }
  .gantt-bar:hover { filter: brightness(1.25); }
  .bar-label {
    font-size: 8px; font-weight: 600;
    color: rgba(255,255,255,0.9);
    white-space: nowrap; padding: 0 5px;
    overflow: hidden; text-overflow: ellipsis;
  }

  /* Footer */
  .footer {
    display: flex; justify-content: space-between;
    align-items: center; margin-top: 16px;
    padding-top: 14px; border-top: 1px solid var(--border);
    flex-wrap: wrap; gap: 8px;
  }
  .footer-brand { font-size: 10px; color: var(--muted); }
  .footer-brand span { color: var(--magenta); }
  .footer-date { font-size: 10px; color: var(--muted); }

  /* Loader */
  .loader-wrap {
    display: flex; align-items: center;
    justify-content: center; min-height: 180px;
  }
  .loader-ring {
    width: 30px; height: 30px;
    border: 3px solid var(--border);
    border-top-color: var(--magenta);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { color: var(--red); font-size:12px; text-align:center; padding:20px; }

  /* Tooltip */
  .tooltip {
    position: fixed; background: #1a1d26;
    border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 14px; pointer-events: none;
    z-index: 999; display: none; min-width: 200px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .tt-name {
    font-family: 'Syne', sans-serif;
    font-size: 12px; font-weight: 700;
    color: var(--text); margin-bottom: 8px; line-height: 1.3;
  }
  .tt-row { display:flex; justify-content:space-between; gap:16px; margin-bottom:3px; }
  .tt-row .lbl { color:var(--muted); font-size:10px; }
  .tt-row .val { color:var(--text); font-size:10px; font-weight:500; }
</style>
</head>
<body>

<div class="tooltip" id="tooltip">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-row"><span class="lbl">Inicio</span><span class="val" id="tt-start"></span></div>
  <div class="tt-row"><span class="lbl">Fin</span><span class="val" id="tt-end"></span></div>
  <div class="tt-row"><span class="lbl">Tipo</span><span class="val" id="tt-tipo"></span></div>
  <div class="tt-row"><span class="lbl">SPI</span><span class="val" id="tt-spi"></span></div>
</div>

<div class="card">
  <div class="card-header">
    <div>
      <div class="card-label">Gestión de Capacidad · Bagó Ecuador</div>
      <div class="card-title">Línea de Tiempo por Responsable</div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--magenta)"></div>Estratégico</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--cyan)"></div>Táctico</div>
      <div class="legend-item">
        <div style="width:2px;height:14px;background:var(--yellow);border-radius:1px"></div>Hoy
      </div>
    </div>
  </div>

  <div id="loader" class="loader-wrap"><div class="loader-ring"></div></div>

  <div id="ganttOuter" class="gantt-outer" style="display:none">
    <div class="gantt-inner" id="ganttInner"></div>
  </div>

  <div class="footer">
    <div class="footer-brand">Portafolio Estratégico + Táctico · <span>Bagó Ecuador</span></div>
    <div class="footer-date" id="footerDate"></div>
  </div>
</div>

<script>
  const TOKEN   = 'ntn_h28436678537wLv37VyJFvRRrho77CWB0CCKSFw61lt8rL';
  const WORKER  = 'https://royal-limit-9465.pochoa.workers.dev/';
  const DB_ESTR = '24d0a97eed8d81e99427e311c9f026aa';
  const DB_TACT = '3210a97eed8d80628599c65e6b0b4ed1';

  // Rango FIJO: Ene 2025 → Dic 2026
  const RANGE_START = new Date(2025, 0, 1);   // 1 Ene 2025
  const RANGE_END   = new Date(2026, 11, 31); // 31 Dic 2026
  const TOTAL_MS    = RANGE_END - RANGE_START;

  const RESP_COLORS = ['#e040fb','#26c6da','#66bb6a','#ffa726','#7c4dff','#f06292','#80cbc4','#ffcc02'];
  const MES_ES      = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

  // Mostrar solo meses de inicio de trimestre: Ene, Abr, Jul, Oct
  const TRIMESTRES  = [0, 3, 6, 9];

  async function api(url, payload={}) {
    const res = await fetch(WORKER, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({url, token:`Bearer ${TOKEN}`, payload})
    });
    return res.json();
  }

  function getTitle(prop) {
    if (!prop || prop.type!=='title') return 'Sin nombre';
    return prop.title?.[0]?.plain_text ?? 'Sin nombre';
  }
  function getSelect(prop) {
    if (!prop) return null;
    if (prop.type==='select') return prop.select?.name ?? null;
    return null;
  }
  function getDates(prop) {
    if (!prop || prop.type!=='date') return {start:null,end:null};
    return {
      start: prop.date?.start ? new Date(prop.date.start) : null,
      end:   prop.date?.end   ? new Date(prop.date.end)   : null
    };
  }
  function getNum(prop) {
    if (!prop) return null;
    if (prop.type==='number')  return prop.number ?? null;
    if (prop.type==='formula') return prop.formula?.number ?? null;
    if (prop.type==='rollup')  return prop.rollup?.number  ?? null;
    return null;
  }
  function fmtDate(d) {
    if (!d) return '—';
    return d.toLocaleDateString('es-EC',{day:'2-digit',month:'short',year:'numeric'});
  }
  function pct(date) {
    return Math.max(0, Math.min(100, ((date - RANGE_START) / TOTAL_MS) * 100));
  }

  async function loadDB(dbId, tipo) {
    const data  = await api(`https://api.notion.com/v1/databases/${dbId}/query`,{page_size:100});
    const pages = data.results || [];
    return pages.map(p => {
      const titleProp = p.properties['Nombre del proyecto']
        || p.properties['Name']
        || Object.values(p.properties).find(x=>x.type==='title');
      const dates = getDates(p.properties['Fechas']);
      return {
        name:        getTitle(titleProp),
        responsable: getSelect(p.properties['Responsable 1']) || 'Sin asignar',
        start:       dates.start,
        end:         dates.end,
        spi:         getNum(p.properties['SPI']),
        tipo
      };
    }).filter(p => p.start && p.end);
  }

  function buildGantt(projects) {
    const today    = new Date();
    const todayPct = pct(today);
    const container = document.getElementById('ganttInner');
    container.innerHTML = '';

    // ── HEADER MESES (trimestral) ──
    const headerRow = document.createElement('div');
    headerRow.className = 'month-header-row';

    const spacer = document.createElement('div');
    spacer.className = 'mh-spacer';
    headerRow.appendChild(spacer);

    const tlHeader = document.createElement('div');
    tlHeader.className = 'mh-timeline';

    // Generar todos los meses del rango y filtrar trimestres
    let cur = new Date(RANGE_START);
    while (cur <= RANGE_END) {
      const m = cur.getMonth();
      const y = cur.getFullYear();
      if (TRIMESTRES.includes(m)) {
        const leftPct = pct(cur);

        const label = document.createElement('div');
        label.className = 'mh-label';
        label.style.left = leftPct + '%';

        const nameSpan = document.createElement('span');
        nameSpan.className = 'm-name';
        nameSpan.textContent = MES_ES[m];

        const yearSpan = document.createElement('span');
        yearSpan.className = 'm-year';
        yearSpan.textContent = y;

        label.appendChild(nameSpan);
        label.appendChild(yearSpan);
        tlHeader.appendChild(label);

        const tick = document.createElement('div');
        tick.className = 'mh-tick';
        tick.style.left = leftPct + '%';
        tlHeader.appendChild(tick);
      }
      cur = new Date(y, m + 1, 1);
    }

    // Línea de hoy en el header
    const todayTick = document.createElement('div');
    todayTick.style.cssText = `position:absolute;bottom:-8px;width:2px;height:8px;
      background:var(--yellow);transform:translateX(-50%);left:${todayPct}%;border-radius:1px;`;
    tlHeader.appendChild(todayTick);

    headerRow.appendChild(tlHeader);
    container.appendChild(headerRow);

    // ── RESPONSABLES ──
    const respMap = {};
    projects.forEach(p => {
      if (!respMap[p.responsable]) respMap[p.responsable] = [];
      respMap[p.responsable].push(p);
    });
    const respNames  = Object.keys(respMap).sort();
    const respColors = {};
    respNames.forEach((r,i) => respColors[r] = RESP_COLORS[i % RESP_COLORS.length]);

    respNames.forEach(resp => {
      const projs = respMap[resp];
      const color = respColors[resp];
      const block = document.createElement('div');
      block.className = 'resp-block';

      // Separador
      const sep = document.createElement('div');
      sep.className = 'resp-sep';
      sep.innerHTML = `
        <span class="resp-dot" style="background:${color}"></span>
        <span class="resp-name">${resp}</span>
        <span class="resp-count">${projs.length} proyecto${projs.length!==1?'s':''}</span>`;
      block.appendChild(sep);

      projs.forEach(p => {
        const row = document.createElement('div');
        row.className = 'proj-row';

        // Nombre
        const nc = document.createElement('div');
        nc.className = 'proj-name-col';
        nc.title = p.name;
        nc.textContent = p.name;

        // Tipo
        const tc = document.createElement('div');
        tc.className = 'proj-tipo-col';
        tc.innerHTML = p.tipo==='Estratégico'
          ? '<span class="tipo-badge tipo-e">E</span>'
          : '<span class="tipo-badge tipo-t">T</span>';

        // Timeline
        const tl = document.createElement('div');
        tl.className = 'timeline-col';

        // Grid lines en trimestres
        let gc = new Date(RANGE_START);
        while (gc <= RANGE_END) {
          if (TRIMESTRES.includes(gc.getMonth())) {
            const gl = document.createElement('div');
            gl.className = 'grid-line';
            gl.style.left = pct(gc) + '%';
            tl.appendChild(gl);
          }
          gc = new Date(gc.getFullYear(), gc.getMonth()+1, 1);
        }

        // Línea hoy
        const todayEl = document.createElement('div');
        todayEl.className = 'today-line';
        todayEl.style.left = todayPct + '%';
        tl.appendChild(todayEl);

        // Barra
        const l = pct(p.start);
        const r = pct(p.end);
        const w = Math.max(r - l, 0.5);

        const barColor = p.tipo==='Estratégico'
          ? 'linear-gradient(90deg,rgba(224,64,251,0.85),rgba(224,64,251,0.5))'
          : 'linear-gradient(90deg,rgba(38,198,218,0.85),rgba(38,198,218,0.5))';

        const bar = document.createElement('div');
        bar.className = 'gantt-bar';
        bar.style.cssText = `left:${l}%;width:${w}%;background:${barColor}`;
        bar.innerHTML = `<span class="bar-label">${p.name}</span>`;
        bar.dataset.name  = p.name;
        bar.dataset.start = fmtDate(p.start);
        bar.dataset.end   = fmtDate(p.end);
        bar.dataset.tipo  = p.tipo;
        bar.dataset.spi   = p.spi!=null ? p.spi.toFixed(2) : '—';

        tl.appendChild(bar);
        row.appendChild(nc);
        row.appendChild(tc);
        row.appendChild(tl);
        block.appendChild(row);

        setTimeout(() => bar.classList.add('show'), 250);
      });

      container.appendChild(block);
    });
  }

  // Tooltip
  const tooltip = document.getElementById('tooltip');
  document.addEventListener('mousemove', e => {
    const bar = e.target.closest('.gantt-bar');
    if (bar) {
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX+14)+'px';
      tooltip.style.top  = (e.clientY-10)+'px';
      document.getElementById('tt-name').textContent  = bar.dataset.name;
      document.getElementById('tt-start').textContent = bar.dataset.start;
      document.getElementById('tt-end').textContent   = bar.dataset.end;
      document.getElementById('tt-tipo').textContent  = bar.dataset.tipo;
      document.getElementById('tt-spi').textContent   = bar.dataset.spi;
    } else {
      tooltip.style.display = 'none';
    }
  });

  async function load() {
    try {
      const [estr, tact] = await Promise.all([
        loadDB(DB_ESTR,'Estratégico'),
        loadDB(DB_TACT,'Táctico')
      ]);
      const all = [...estr,...tact];
      if (!all.length) throw new Error('Sin proyectos');

      buildGantt(all);

      const now = new Date();
      document.getElementById('footerDate').textContent =
        'Actualizado: ' + now.toLocaleDateString('es-EC',{day:'2-digit',month:'short',year:'numeric'}) +
        ' · ' + now.toLocaleTimeString('es-EC',{hour:'2-digit',minute:'2-digit'});

      document.getElementById('loader').style.display     = 'none';
      document.getElementById('ganttOuter').style.display = 'block';

    } catch(e) {
      console.error(e);
      document.getElementById('loader').innerHTML =
        '<div class="error-msg">No se pudo cargar el Gantt.</div>';
    }
  }

  load();
</script>
</body>
</html>
