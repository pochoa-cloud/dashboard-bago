<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistente PMO · Bagó</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0b0f;
    font-family: 'DM Sans', sans-serif;
    color: #e8eaf0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  .header {
    padding: 14px 20px;
    background: #111318;
    border-bottom: 1px solid #1a1d26;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .header-icon {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, #7c4dff, #e040fb);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .header-text { flex: 1; }

  .header-title {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: #e8eaf0;
  }

  .header-sub {
    font-size: 11px;
    color: #4a5068;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #4a5068;
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .status-dot.ready { background: #66bb6a; box-shadow: 0 0 6px #66bb6a66; }
  .status-dot.loading { background: #ffa726; box-shadow: 0 0 6px #ffa72666; }

  /* MESSAGES */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: #1a1d26; border-radius: 4px; }

  .msg {
    display: flex;
    gap: 10px;
    animation: msgIn 0.3s ease;
    max-width: 100%;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg.assistant .msg-avatar { background: linear-gradient(135deg, #7c4dff, #e040fb); }
  .msg.user .msg-avatar { background: #1a1d26; }

  .msg-bubble {
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.6;
    max-width: calc(100% - 48px);
    word-break: break-word;
  }

  .msg.assistant .msg-bubble {
    background: #111318;
    border: 1px solid #1a1d26;
    color: #c0c4d6;
    border-radius: 4px 12px 12px 12px;
  }

  .msg.user .msg-bubble {
    background: linear-gradient(135deg, #7c4dff22, #e040fb22);
    border: 1px solid #7c4dff44;
    color: #e8eaf0;
    border-radius: 12px 4px 12px 12px;
  }

  .msg-bubble strong { color: #e8eaf0; font-weight: 600; }
  .msg-bubble ul { padding-left: 16px; margin: 4px 0; }
  .msg-bubble li { margin: 2px 0; }

  /* TYPING */
  .typing-dots {
    display: flex; gap: 4px; align-items: center; padding: 4px 0;
  }
  .typing-dots span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4a5068;
    animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); background: #e040fb; }
  }

  /* SUGGESTIONS */
  .suggestions {
    padding: 0 20px 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    flex-shrink: 0;
  }

  .suggestion {
    font-size: 11px;
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid #1a1d26;
    background: #111318;
    color: #6a6e82;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .suggestion:hover {
    border-color: #e040fb44;
    color: #e040fb;
    background: #e040fb11;
  }

  /* INPUT */
  .input-area {
    padding: 12px 20px 16px;
    border-top: 1px solid #1a1d26;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
    background: #0a0b0f;
  }

  .input-wrap {
    flex: 1;
    background: #111318;
    border: 1px solid #1a1d26;
    border-radius: 12px;
    display: flex;
    align-items: flex-end;
    padding: 10px 14px;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within { border-color: #7c4dff44; }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #e8eaf0;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    resize: none;
    max-height: 100px;
    line-height: 1.5;
  }

  textarea::placeholder { color: #3a3d4a; }

  .send-btn {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, #7c4dff, #e040fb);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.1s;
  }

  .send-btn:hover { opacity: 0.85; }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* INIT LOADING */
  .init-msg {
    text-align: center;
    padding: 40px 20px;
    color: #4a5068;
    font-size: 12px;
  }

  .init-spinner {
    width: 24px; height: 24px;
    border: 2px solid #1a1d26;
    border-top-color: #e040fb;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🤖</div>
  <div class="header-text">
    <div class="header-title">Asistente PMO</div>
    <div class="header-sub">Portafolio Estratégico · Bagó Ecuador</div>
  </div>
  <div class="status-dot" id="status-dot"></div>
</div>

<div class="messages" id="messages">
  <div class="init-msg" id="init-msg">
    <div class="init-spinner"></div>
    Cargando datos del portafolio...
  </div>
</div>

<div class="suggestions" id="suggestions" style="display:none">
  <div class="suggestion" onclick="sendSuggestion(this)">¿Cuál es el SPI actual?</div>
  <div class="suggestion" onclick="sendSuggestion(this)">¿Qué proyectos están en riesgo?</div>
  <div class="suggestion" onclick="sendSuggestion(this)">¿Cómo va el avance por área?</div>
  <div class="suggestion" onclick="sendSuggestion(this)">Comparar avance real vs esperado</div>
  <div class="suggestion" onclick="sendSuggestion(this)">¿Quién tiene mejor SPI promedio?</div>
</div>

<div class="input-area">
  <div class="input-wrap">
    <textarea id="user-input" placeholder="Pregunta sobre el portafolio..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  </div>
  <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>➤</button>
</div>

<script>
  const TOKEN    = 'ntn_h28436678537wLv37VyJFvRRrho77CWB0CCKSFw61lt8rL';
  const WORKER   = 'https://royal-limit-9465.pochoa.workers.dev/';
  const PAGE_ID  = '31a0a97eed8d8019b154fd5b94712b14';
  const PROJ_DB  = '24d0a97eed8d81e99427e311c9f026aa';
  const HIST_DB  = '31f0a97eed8d80e5ad0dd78acb17999d';

  let portfolioContext = '';
  let history = [];
  let isLoading = false;

  async function notionApi(url, payload = {}) {
    const res = await fetch(WORKER, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, token: `Bearer ${TOKEN}`, payload })
    });
    return res.json();
  }

  function exNum(prop) {
    if (!prop) return null;
    if (prop.type === 'rollup' && prop.rollup?.type === 'number') return prop.rollup.number;
    if (prop.type === 'formula') return prop.formula?.number ?? null;
    if (prop.type === 'number') return prop.number ?? null;
    return null;
  }

  function toP(v) {
    if (v === null) return null;
    return v <= 1 ? Math.round(v * 10000) / 100 : Math.round(v * 100) / 100;
  }

  async function loadPortfolioData() {
    try {
      // KPIs
      const kpiData = await notionApi(`https://api.notion.com/v1/pages/${PAGE_ID}`);
      const props = kpiData.properties || {};
      const real = toP(exNum(props['Avance real del Portafolio']));
      const esp  = toP(exNum(props['Avance Esperado']));
      const spi  = toP(exNum(props['SPI Portafolio']));

      // Projects
      const projData = await notionApi(`https://api.notion.com/v1/databases/${PROJ_DB}/query`, {
        sorts: [{ property: 'Nombre del proyecto', direction: 'ascending' }],
        page_size: 100
      });

      const projects = (projData.results || []).map(page => {
        const p = page.properties;
        const nombre   = p['Nombre del proyecto']?.title?.[0]?.plain_text ?? '—';
        const area     = p['Área']?.select?.name ?? '—';
        const estado   = p['Estado']?.status?.name ?? p['Estado']?.select?.name ?? '—';
        const realPct  = toP(exNum(p['% Real']));
        const espPct   = toP(exNum(p['% Esperado']));
        const spiVal   = toP(exNum(p['SPI']));
        const sem      = p['Semáforo']?.formula?.string ?? '—';
        const responsable = (p['Resposable']?.people ?? []).map(u => u.name).join(', ') || '—';
        const fechaIn  = p['Fechas']?.date?.start ?? '—';
        const fechaFin = p['Fechas']?.date?.end   ?? '—';
        return { nombre, area, estado, realPct, espPct, spiVal, sem, responsable, fechaIn, fechaFin };
      });

      // Historical SPI
      const histData = await notionApi(`https://api.notion.com/v1/databases/${HIST_DB}/query`, {
        sorts: [{ property: 'Fecha', direction: 'ascending' }],
        page_size: 100
      });

      const histPoints = (histData.results || []).map(page => {
        const p = page.properties;
        const fecha = p['Fecha']?.date?.start ?? '—';
        let spiH = p['SPI']?.type === 'number' ? p['SPI'].number : p['SPI']?.formula?.number ?? null;
        if (spiH !== null && spiH <= 1) spiH = Math.round(spiH * 10000) / 100;
        return { fecha, spi: spiH };
      });

      // Build context
      const today = new Date().toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' });

      portfolioContext = `
Eres un asistente ejecutivo de PMO (Gestión de Portafolio de Proyectos) para Bagó Ecuador.
Responde siempre en español, de manera concisa y ejecutiva. Usa datos exactos. 
Si te preguntan algo que no está en los datos, dilo claramente.
Hoy es ${today}.

=== PORTAFOLIO ESTRATÉGICO 2026 ===
KPIs consolidados:
- Avance Real del Portafolio: ${real !== null ? real + '%' : 'N/D'}
- Avance Esperado del Portafolio: ${esp !== null ? esp + '%' : 'N/D'}
- SPI Portafolio: ${spi !== null ? spi + '%' : 'N/D'}
- Total de proyectos: ${projects.length}

Interpretación del SPI: ≥90% = En buen camino, 80-89.9% = Atención requerida, <80% = En riesgo

=== PROYECTOS INDIVIDUALES ===
${projects.map((p, i) => `
Proyecto ${i+1}: ${p.nombre}
  - Área: ${p.area}
  - Estado: ${p.estado}
  - Responsable: ${p.responsable}
  - Avance Real: ${p.realPct !== null ? p.realPct + '%' : 'N/D'}
  - Avance Esperado: ${p.espPct !== null ? p.espPct + '%' : 'N/D'}
  - SPI: ${p.spiVal !== null ? p.spiVal : 'N/D'}
  - Semáforo: ${p.sem}
  - Fechas: ${p.fechaIn} → ${p.fechaFin}
`).join('')}

=== EVOLUCIÓN HISTÓRICA SPI ===
${histPoints.map(h => `- ${h.fecha}: SPI ${h.spi !== null ? h.spi + '%' : 'N/D'}`).join('\n')}

=== ANÁLISIS POR ÁREA ===
${(() => {
  const areas = {};
  projects.forEach(p => {
    if (!areas[p.area]) areas[p.area] = { count: 0, spis: [], reals: [] };
    areas[p.area].count++;
    if (p.spiVal !== null) areas[p.area].spis.push(p.spiVal);
    if (p.realPct !== null) areas[p.area].reals.push(p.realPct);
  });
  return Object.entries(areas).map(([area, d]) => {
    const avgSpi  = d.spis.length  ? (d.spis.reduce((a,b)=>a+b,0)/d.spis.length).toFixed(2)   : 'N/D';
    const avgReal = d.reals.length ? (d.reals.reduce((a,b)=>a+b,0)/d.reals.length).toFixed(2) : 'N/D';
    return `- ${area}: ${d.count} proyecto(s), Avance Real promedio: ${avgReal}%, SPI promedio: ${avgSpi}`;
  }).join('\n');
})()}

=== ANÁLISIS POR RESPONSABLE ===
${(() => {
  const resps = {};
  projects.forEach(p => {
    const r = p.responsable || 'Sin asignar';
    if (!resps[r]) resps[r] = { count: 0, spis: [], reals: [] };
    resps[r].count++;
    if (p.spiVal !== null) resps[r].spis.push(p.spiVal);
    if (p.realPct !== null) resps[r].reals.push(p.realPct);
  });
  return Object.entries(resps).map(([r, d]) => {
    const avgSpi  = d.spis.length  ? (d.spis.reduce((a,b)=>a+b,0)/d.spis.length).toFixed(2)   : 'N/D';
    const avgReal = d.reals.length ? (d.reals.reduce((a,b)=>a+b,0)/d.reals.length).toFixed(2) : 'N/D';
    return `- ${r}: ${d.count} proyecto(s), Avance Real promedio: ${avgReal}%, SPI promedio: ${avgSpi}`;
  }).join('\n');
})()}
`.trim();

      // Ready
      document.getElementById('init-msg').style.display = 'none';
      document.getElementById('status-dot').className = 'status-dot ready';
      document.getElementById('send-btn').disabled = false;
      document.getElementById('suggestions').style.display = 'flex';

      addMessage('assistant', `¡Hola! Tengo cargados los datos del **Portafolio Estratégico 2026** de Bagó Ecuador.\n\n📊 **${projects.length} proyectos** · SPI: **${spi}%** · Avance Real: **${real}%**\n\n¿Qué quieres analizar?`);

    } catch(e) {
      console.error(e);
      document.getElementById('init-msg').innerHTML = '<p style="color:#ef5350">Error al cargar datos. Verifica la conexión.</p>';
    }
  }

  function addMessage(role, text) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = role === 'assistant' ? '🤖' : '👤';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = formatText(text);

    div.appendChild(avatar);
    div.appendChild(bubble);
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  function formatText(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>')
      .replace(/^- (.+)/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
  }

  function addTyping() {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg assistant';
    div.id = 'typing-msg';

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

    div.appendChild(avatar);
    div.appendChild(bubble);
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const text  = input.value.trim();
    if (!text || isLoading) return;

    input.value = '';
    input.style.height = 'auto';
    isLoading = true;
    document.getElementById('send-btn').disabled = true;
    document.getElementById('status-dot').className = 'status-dot loading';
    document.getElementById('suggestions').style.display = 'none';

    addMessage('user', text);
    history.push({ role: 'user', content: text });

    const typingEl = addTyping();

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: portfolioContext,
          messages: history
        })
      });

      const data = await res.json();
      const reply = data.content?.[0]?.text ?? 'No pude generar una respuesta.';

      typingEl.remove();
      history.push({ role: 'assistant', content: reply });
      addMessage('assistant', reply);

    } catch(e) {
      typingEl.remove();
      addMessage('assistant', 'Hubo un error al consultar. Intenta nuevamente.');
      console.error(e);
    }

    isLoading = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('status-dot').className = 'status-dot ready';
  }

  function sendSuggestion(el) {
    document.getElementById('user-input').value = el.textContent;
    sendMessage();
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  loadPortfolioData();
</script>
</body>
</html>
