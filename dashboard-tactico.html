<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard · Portafolio Táctico 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:      #0a0b0f;
    --surface: #111318;
    --border:  #1a1d26;
    --text:    #e8eaf0;
    --muted:   #4a5068;
    --magenta: #e040fb;
    --cyan:    #26c6da;
    --yellow:  #ffa726;
    --red:     #ef5350;
    --green:   #66bb6a;
    --violet:  #7c4dff;
    --pink:    #f06292;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    padding: 24px;
    min-height: 100vh;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 28px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .card-label {
    font-size: 9px; font-weight: 500;
    letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 20px;
  }
  .footer {
    display: flex; justify-content: space-between;
    align-items: center; margin-top: 20px;
  }
  .footer-brand {
    font-size: 10px; color: var(--muted); letter-spacing: 0.5px;
  }
  .footer-brand span { color: var(--magenta); }
  .footer-date { font-size: 10px; color: var(--muted); }

  /* ── KPI CARDS ── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  @media (max-width: 700px) { .kpi-grid { grid-template-columns: repeat(2,1fr); } }
  .kpi-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 14px 12px;
    position: relative;
  }
  .kpi-box::after {
    content: '';
    position: absolute;
    bottom: 0; left: 14px; right: 14px;
    height: 2px; border-radius: 2px;
  }
  .kpi-box.magenta::after { background: var(--magenta); }
  .kpi-box.cyan::after    { background: var(--cyan); }
  .kpi-box.pink::after    { background: var(--pink); }
  .kpi-box.spi-color::after { background: var(--spi-c, var(--cyan)); }

  .kpi-label {
    font-size: 9px; font-weight: 500;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 8px;
  }
  .kpi-value {
    font-family: 'Syne', sans-serif;
    font-size: 28px; font-weight: 800;
    line-height: 1; letter-spacing: -0.5px;
  }
  .kpi-value.magenta { color: var(--magenta); }
  .kpi-value.cyan    { color: var(--cyan); }
  .kpi-value.pink    { color: var(--pink); }

  /* ── ESTADOS ── */
  .estados-grid {
    display: flex;
    justify-content: space-around;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .estado-item { text-align: center; }
  .estado-ring {
    position: relative;
    width: 72px; height: 72px;
    margin: 0 auto 8px;
  }
  .estado-ring svg { width:100%; height:100%; transform:rotate(-90deg); }
  .estado-count {
    position: absolute;
    top:50%; left:50%; transform:translate(-50%,-50%);
    font-family: 'Syne', sans-serif;
    font-size: 20px; font-weight: 800;
  }
  .estado-label {
    font-size: 9px; font-weight: 500;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--muted);
  }

  /* ── ÁREAS ── */
  .area-row {
    display: flex; align-items: center;
    gap: 12px; margin-bottom: 16px;
  }
  .area-row:last-child { margin-bottom: 0; }
  .area-name {
    font-size: 13px; font-weight: 500;
    color: var(--text); min-width: 120px;
  }
  .area-bar-wrap {
    flex: 1; height: 6px;
    background: rgba(255,255,255,0.05);
    border-radius: 6px; overflow: hidden;
  }
  .area-bar {
    height: 100%; border-radius: 6px;
    background: linear-gradient(90deg, var(--magenta), var(--cyan));
    width: 0;
    transition: width 1.2s cubic-bezier(.4,0,.2,1);
  }
  .area-meta {
    display: flex; gap: 12px;
    font-size: 11px; color: var(--muted);
    min-width: 110px; justify-content: flex-end;
  }
  .area-meta .num { color: var(--text); font-weight: 500; }
  .area-meta .pct { color: var(--cyan); font-family:'Syne',sans-serif; font-weight:700; }

  /* ── LOADER ── */
  .loader-wrap {
    display: flex; align-items: center;
    justify-content: center; min-height: 80px;
  }
  .loader-ring {
    width:28px; height:28px;
    border:3px solid var(--border);
    border-top-color:var(--magenta);
    border-radius:50%;
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  .error-msg { color:var(--red); font-size:12px; text-align:center; padding:12px; }
</style>
</head>
<body>

<!-- ── KPI CARDS ── -->
<div class="card">
  <div class="card-label">Indicadores Consolidados del Portafolio</div>
  <div id="kpiLoader" class="loader-wrap"><div class="loader-ring"></div></div>
  <div id="kpiGrid" class="kpi-grid" style="display:none">
    <div class="kpi-box magenta">
      <div class="kpi-label">Proyectos</div>
      <div class="kpi-value magenta" id="kpiProyectos">—</div>
    </div>
    <div class="kpi-box pink">
      <div class="kpi-label">Avance Real</div>
      <div class="kpi-value pink" id="kpiReal">—</div>
    </div>
    <div class="kpi-box" style="--after-bg:var(--yellow)">
      <div class="kpi-label">Avance Esperado</div>
      <div class="kpi-value" id="kpiEsperado" style="color:var(--yellow)">—</div>
    </div>
    <div class="kpi-box spi-color">
      <div class="kpi-label">SPI Portafolio</div>
      <div class="kpi-value" id="kpiSPI" style="color:var(--cyan)">—</div>
    </div>
  </div>
  <div class="footer">
    <div class="footer-brand">Portafolio Táctico · <span>Bagó Ecuador</span></div>
    <div class="footer-date" id="kpiDate"></div>
  </div>
</div>

<!-- ── ESTADOS ── -->
<div class="card">
  <div class="card-label">Proyectos por Estado</div>
  <div id="estadosLoader" class="loader-wrap"><div class="loader-ring"></div></div>
  <div id="estadosGrid" class="estados-grid" style="display:none">
    <!-- se inyecta dinámicamente -->
  </div>
  <div class="footer">
    <div class="footer-brand">Portafolio Táctico · <span>Bagó Ecuador</span></div>
    <div class="footer-date" id="estadosDate"></div>
  </div>
</div>

<!-- ── ÁREAS ── -->
<div class="card">
  <div class="card-label">Distribución por Área</div>
  <div id="areasLoader" class="loader-wrap"><div class="loader-ring"></div></div>
  <div id="areasContent" style="display:none">
    <!-- se inyecta dinámicamente -->
  </div>
  <div class="footer">
    <div class="footer-brand">Portafolio Táctico · <span>Bagó Ecuador</span></div>
    <div class="footer-date" id="areasDate"></div>
  </div>
</div>

<script>
  const TOKEN  = 'ntn_h28436678537wLv37VyJFvRRrho77CWB0CCKSFw61lt8rL';
  const WORKER = 'https://royal-limit-9465.pochoa.workers.dev/';
  const DB_ID  = '3210a97eed8d80628599c65e6b0b4ed1';

  async function api(url, payload = {}) {
    const res = await fetch(WORKER, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, token: `Bearer ${TOKEN}`, payload })
    });
    return res.json();
  }

  function getNum(prop) {
    if (!prop) return null;
    if (prop.type === 'number')  return prop.number ?? null;
    if (prop.type === 'formula') return prop.formula?.number ?? null;
    if (prop.type === 'rollup')  return prop.rollup?.number  ?? null;
    return null;
  }

  function getStatus(prop) {
    if (!prop) return null;
    if (prop.type === 'status') return prop.status?.name ?? null;
    if (prop.type === 'select') return prop.select?.name  ?? null;
    return null;
  }

  function getArea(prop) {
    if (!prop) return null;
    if (prop.type === 'select') return prop.select?.name ?? null;
    if (prop.type === 'multi_select') return prop.multi_select?.[0]?.name ?? null;
    return null;
  }

  function fmt(val) {
    if (val == null) return '—';
    const pct = val <= 1 ? val * 100 : val;
    return pct.toFixed(1) + '%';
  }

  function spiColor(v) {
    if (v >= 0.90) return '#26c6da';
    if (v >= 0.80) return '#ffa726';
    return '#ef5350';
  }

  function nowStr() {
    const now = new Date();
    return 'Actualizado: ' +
      now.toLocaleDateString('es-EC', { day:'2-digit', month:'short', year:'numeric' }) +
      ' · ' + now.toLocaleTimeString('es-EC', { hour:'2-digit', minute:'2-digit' });
  }

  const ESTADO_CONFIG = {
    'Planificación': { color:'#26c6da', r:28 },
    'En curso':      { color:'#ffa726', r:28 },
    'Hecho':         { color:'#66bb6a', r:28 },
    'En pausa':      { color:'#7c4dff', r:28 },
    'Cancelado':     { color:'#ef5350', r:28 },
  };

  const CIRCUM = 2 * Math.PI * 28; // ≈ 175.93

  function estadoSVG(label, count, total, color) {
    const pct    = total > 0 ? count / total : 0;
    const offset = CIRCUM * (1 - pct);
    return `
      <div class="estado-item">
        <div class="estado-ring">
          <svg viewBox="0 0 72 72">
            <circle cx="36" cy="36" r="28"
              fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="6"/>
            <circle cx="36" cy="36" r="28"
              fill="none" stroke="${color}" stroke-width="6"
              stroke-linecap="round"
              stroke-dasharray="${CIRCUM}"
              stroke-dashoffset="${CIRCUM}"
              style="transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)"
              data-offset="${offset}"/>
          </svg>
          <div class="estado-count" style="color:${color}">${count}</div>
        </div>
        <div class="estado-label">${label}</div>
      </div>`;
  }

  async function load() {
    try {
      const data  = await api(
        `https://api.notion.com/v1/databases/${DB_ID}/query`,
        { page_size: 100 }
      );
      const pages = data.results || [];
      const ts    = nowStr();

      // ── KPIs ──
      let sumReal = 0, sumEsp = 0, count = 0;
      pages.forEach(p => {
        const r = getNum(p.properties['% Real']);
        const e = getNum(p.properties['% Esperado']);
        if (r != null && e != null) { sumReal += r; sumEsp += e; count++; }
      });
      const avgReal = count ? sumReal / count : 0;
      const avgEsp  = count ? sumEsp  / count : 0;
      const spi     = avgEsp > 0 ? avgReal / avgEsp : 0;
      const sc      = spiColor(spi);

      document.getElementById('kpiProyectos').textContent = pages.length;
      document.getElementById('kpiReal').textContent      = fmt(avgReal);
      document.getElementById('kpiEsperado').textContent  = fmt(avgEsp);
      document.getElementById('kpiSPI').textContent       = (spi * 100).toFixed(2) + '%';
      document.getElementById('kpiSPI').style.color       = sc;
      document.getElementById('kpiDate').textContent      = ts;
      document.getElementById('kpiLoader').style.display  = 'none';
      document.getElementById('kpiGrid').style.display    = 'grid';

      // ── ESTADOS ──
      const estadoMap = {};
      pages.forEach(p => {
        const s = getStatus(p.properties['Estado']) || 'Sin estado';
        estadoMap[s] = (estadoMap[s] || 0) + 1;
      });
      const total = pages.length;
      const orden = ['Planificación','En curso','Hecho','En pausa','Cancelado'];
      let estadosHTML = '';
      orden.forEach(e => {
        const cfg   = ESTADO_CONFIG[e] || { color:'#4a5068' };
        const count = estadoMap[e] || 0;
        estadosHTML += estadoSVG(e.toUpperCase(), count, total, cfg.color);
      });
      document.getElementById('estadosGrid').innerHTML = estadosHTML;
      document.getElementById('estadosDate').textContent = ts;
      document.getElementById('estadosLoader').style.display = 'none';
      document.getElementById('estadosGrid').style.display   = 'flex';

      // Animar anillos de estados
      setTimeout(() => {
        document.querySelectorAll('[data-offset]').forEach(el => {
          el.style.strokeDashoffset = el.getAttribute('data-offset');
        });
      }, 200);

      // ── ÁREAS ──
      const areaMap = {};
      pages.forEach(p => {
        const a = getArea(p.properties['Área']) || 'Sin área';
        const r = getNum(p.properties['% Real']);
        if (!areaMap[a]) areaMap[a] = { count: 0, sumReal: 0 };
        areaMap[a].count++;
        if (r != null) areaMap[a].sumReal += r;
      });

      const areasSorted = Object.entries(areaMap)
        .map(([name, d]) => ({
          name,
          count: d.count,
          avgReal: d.count > 0 ? d.sumReal / d.count : 0
        }))
        .sort((a, b) => b.avgReal - a.avgReal);

      const maxReal = Math.max(...areasSorted.map(a => a.avgReal), 0.01);

      let areasHTML = '';
      areasSorted.forEach(a => {
        const barPct = (a.avgReal / maxReal) * 100;
        const pctStr = fmt(a.avgReal);
        areasHTML += `
          <div class="area-row">
            <div class="area-name">${a.name}</div>
            <div class="area-bar-wrap">
              <div class="area-bar" style="width:0" data-width="${barPct}%"></div>
            </div>
            <div class="area-meta">
              <span class="num">${a.count} proy.</span>
              <span class="pct">${pctStr}</span>
            </div>
          </div>`;
      });

      document.getElementById('areasContent').innerHTML = areasHTML;
      document.getElementById('areasDate').textContent  = ts;
      document.getElementById('areasLoader').style.display  = 'none';
      document.getElementById('areasContent').style.display = 'block';

      // Animar barras
      setTimeout(() => {
        document.querySelectorAll('.area-bar[data-width]').forEach(el => {
          el.style.width = el.getAttribute('data-width');
        });
      }, 300);

    } catch(e) {
      console.error(e);
      ['kpiLoader','estadosLoader','areasLoader'].forEach(id => {
        document.getElementById(id).innerHTML =
          '<div class="error-msg">No se pudo conectar con Notion.</div>';
      });
    }
  }

  load();
</script>
</body>
</html>
